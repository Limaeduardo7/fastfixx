  <!-- Preloader -->
  <style>
    #preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #0B0E14;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out, visibility 0.5s;
    }

    .loader-content {
      text-align: center;
    }

    .loader-circle {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #FF5C00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #preloader.hidden {
      opacity: 0;
      visibility: hidden;
    }
  </style>
</head>

<body>
  <!-- Preloader -->
  <div id="preloader">
    <div class="loader-content">
      <div class="loader-circle"></div>
      <p
        style="color: #FF5C00; font-weight: 800; font-family: 'Inter', sans-serif; letter-spacing: 2px; font-size: 10px; text-transform: uppercase;">
        Carregando...</p>
    </div>
  </div>

  <!-- React Root -->
  <div id="root"></div>

  <script type="module" src="/src/ebook-main.jsx"></script>

  <script>
    window.addEventListener('load', function () {
      var preloader = document.getElementById('preloader');
      if (preloader) {
        preloader.classList.add('hidden');
        setTimeout(function () { preloader.style.display = 'none'; }, 500);
      }
    });
  </script>
</body>
